spring.application.name=harmoGestionAPI
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.datasource.url=${HARMOGESTION_CI_DB_URL}
spring.datasource.username=${HARMOGESTION_CI_DB_USERNAME}
spring.datasource.password=${HARMOGESTION_CI_DB_PASSWORD}
spring.datasource.driver-class-name=${HARMOGESTION_CI_DB_DRIVER}
spring.jpa.properties.hibernate.dialect=${HARMOGESTION_CI_DB_DIALECT}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl