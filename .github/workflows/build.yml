name: SonarQube
on:
    push:
        branches:
            - main
        paths:
            - 'src/**'
            - '.github/workflows/**'
            - pom.xml
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
            - main
        paths:
            - 'src/**'
            - '.github/workflows/**'
            - pom.xml
jobs:
    build:
        name: Build and analyze
        runs-on: ubuntu-latest
        services:
            mysql_server:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: ${{secrets.DB_PASSWORD}}
                    MYSQL_DATABASE: ${{secrets.DB_NAME}}
                ports:
                    - 3306:3306
                options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                  java-version: 25
                  distribution: 'zulu' # Alternative distribution options are available.
            - name: Cache SonarQube packages
              uses: actions/cache@v5
              with:
                  path: ~/.sonar/cache
                  key: ${{ runner.os }}-sonar
                  restore-keys: ${{ runner.os }}-sonar
            - name: Cache Maven packages
              uses: actions/cache@v5
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
                  restore-keys: ${{ runner.os }}-m2
            - name: wait_for_MySQL_to_be_ready
              run: |
                  while ! mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
                    sleep 1
                  done
            - name: create_database_from_script
              env:
                  DB_PASSWORD: ${{secrets.DB_PASSWORD}}
                  DB_NAME: ${{secrets.DB_NAME}}
              run: mysql -h 127.0.0.1 -u root -p$DB_PASSWORD $DB_NAME < ${{ github.workspace }}/script_bdd/script.sql
            - name: Build and analyze
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  HARMOGESTION_CI_DB_URL: jdbc:mysql://localhost:3306/${{secrets.DB_NAME}}
                  HARMOGESTION_CI_DB_USERNAME: root
                  HARMOGESTION_CI_DB_PASSWORD: ${{secrets.DB_PASSWORD}}
                  HARMOGESTION_CI_DB_DRIVER: com.mysql.cj.jdbc.Driver
                  HARMOGESTION_CI_DB_DIALECT: org.hibernate.dialect.MySQLDialect
              run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=Cedric-Didier_HarmoGestion_API_Fork -Dspring.profiles.active=ci
            - name: Charging artifact
              uses: actions/upload-artifact@v7
              with:
                name: harmogestionAPI-jar
                path: target/*.jar
                retention-days: 1